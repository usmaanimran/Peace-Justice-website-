<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="4; url=home.html">
    <title>Peace & Justice | Welcome</title>
    
    <link rel="prefetch" href="home.html">
    <link rel="stylesheet" href="style.css">

    <style>
        .splash-body {
            background-color: var(--bg-dark);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Burn Background */
        .splash-bg {
            position: absolute;
            top: -5%; left: -5%; width: 110%; height: 110%;
            background-image: 
                linear-gradient(rgba(5, 7, 10, 0.85), rgba(5, 7, 10, 0.95)), 
                url('earth.jpg');
            background-size: cover;
            background-position: center;
            z-index: 0;
            animation: kenBurns 12s ease-out forwards;
        }
        
        @keyframes kenBurns {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        
        #particles-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            bottom: -10px;
            background: var(--accent-gold);
            border-radius: 50%;
            opacity: 0;
            box-shadow: 0 0 10px var(--accent-gold);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-100vh) scale(0.3); opacity: 0; }
        }

        /*Presentation Card */
        .splash-content-wrapper {
            position: relative;
            z-index: 10;
            background: rgba(15, 20, 25, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            max-width: 650px;
            width: 90%;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(197, 160, 89, 0.1);
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* GlowingAura */
        .splash-logo {
            width: 80px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(197, 160, 89, 0.6));
            animation: pulseGlow 3s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.4)); transform: scale(1); }
            100% { filter: drop-shadow(0 0 30px rgba(197, 160, 89, 0.8)); transform: scale(1.05); }
        }

        .splash-title {
            font-family: var(--font-heading);
            font-size: 3.5rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        
        .splash-mission {
            color: var(--text-muted);
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 35px;
            font-family: var(--font-body);
        }

        
        .orbital-loader {
            position: relative;
            width: 60px;
            height: 60px;
            margin: 0 auto 25px;
        }
        
        .orbital-loader::before, .orbital-loader::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
        }
        
        .orbital-loader::before {
            top: 0; left: 0; right: 0; bottom: 0;
            border-top-color: var(--accent-gold);
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }
        
        .orbital-loader::after {
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border-bottom-color: var(--accent-slate);
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite reverse;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .countdown-text {
            font-family: var(--font-body);
            color: var(--accent-gold);
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* Skip Button */
        .skip-btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid rgba(197, 160, 89, 0.5);
            padding: 12px 35px;
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .skip-btn:hover {
            background: var(--accent-gold);
            color: #000;
            box-shadow: 0 10px 25px rgba(197, 160, 89, 0.3);
            transform: translateY(-3px);
            border-color: var(--accent-gold);
        }

        /* Team Members Footer */
        .team-members {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            z-index: 10;
            color: var(--text-muted);
            font-family: var(--font-body);
            font-size: 0.85rem;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* ==========================================
           TRANSITION 
           ========================================== */
        
        .flash-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--accent-gold);
            opacity: 0;
            z-index: 9999;
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        .warp-bg {
            animation: warpDive 0.6s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards !important;
        }
        @keyframes warpDive {
            to { transform: scale(2.5); filter: blur(25px) brightness(1.5); opacity: 0; }
        }

        .warp-card {
            animation: cardDrop 0.5s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards !important;
        }
        @keyframes cardDrop {
            to { transform: translateY(-100px) scale(0.8) rotateX(15deg); opacity: 0; filter: blur(15px); }
        }

        .flash-active {
            animation: flashBang 0.6s ease-out forwards;
        }
        @keyframes flashBang {
            0% { opacity: 0; }
            40% { opacity: 0.8; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body class="splash-body">

    <div class="splash-bg"></div>
    
    <div id="particles-container"></div>

    <div class="splash-content-wrapper" id="splashWrapper">
        <img src="crow.png" alt="Peace & Justice Logo" class="splash-logo">
        
        <h1 class="splash-title">Peace <span class="text-gradient">&amp;</span> Justice</h1>
        
        <p class="splash-mission">
            Advocating for the global stability, equal rights, and transparency required to build a sustainable future for all.
        </p>

        <div class="orbital-loader"></div>

        <div id="countdownText" class="countdown-text">Entering site in 4...</div>
        
        <button class="skip-btn" id="skipBtn">Skip Intro</button>
    </div>

    <div class="team-members">
        <strong>Humpty Dumpty :</strong> Usmaan Imran | Zehna Anus | Thasreef Mohomad | Manisha Fernando
    </div>

    <div class="flash-overlay" id="flashOverlay"></div>

    <script src="splash.js"></script>
</body>
</html>
