<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="4; url=home.html">
    <title>Peace & Justice | Welcome</title>
    
    <link rel="stylesheet" href="style.css">

    <style>
        .splash-body {
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(3, 5, 8, 0.85), rgba(3, 5, 8, 0.95)), 
                url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            overflow: hidden; 
        }

        .bg-icon-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bg-icon-container::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(40px);
            animation: pulseAura 4s infinite ease-in-out;
        }

        @keyframes pulseAura {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 0.8; }
        }

        .glowing-crow {
            width: 80vw;
            max-width: 800px;
            opacity: 0.1; 
            mix-blend-mode: screen; 
            filter: drop-shadow(0 0 30px rgba(0, 240, 255, 0.4)) 
                    drop-shadow(0 0 60px rgba(112, 0, 255, 0.2));
            animation: pulseBird 4s infinite ease-in-out;
        }

        @keyframes pulseBird {
            0%, 100% { filter: drop-shadow(0 0 30px rgba(0, 240, 255, 0.4)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 50px rgba(0, 240, 255, 0.6)); transform: scale(1.02); }
        }

        .splash-container { position: relative; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        .splash-content { text-align: center; pointer-events: none; }
        .splash-title { font-family: var(--font-heading); font-size: 4.5rem; margin-bottom: 10px; }
        .splash-mission { color: var(--text-muted); max-width: 500px; margin-bottom: 20px; line-height: 1.5; font-size: 1.1rem;}

        .css-loader { border: 3px solid var(--glass-border); border-top: 3px solid var(--accent-cyan); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 25px auto; box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .countdown-text { font-family: var(--font-body); color: var(--accent-cyan); margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; font-size: 0.85rem;}

        .skip-btn { background: transparent; color: var(--text-main); border: 1px solid var(--accent-purple); padding: 12px 35px; font-size: 0.9rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 0 15px rgba(112, 0, 255, 0.2); position: relative; z-index: 20; }
        .skip-btn:hover { background: var(--accent-purple); color: #fff; box-shadow: 0 0 25px rgba(112, 0, 255, 0.6); transform: translateY(-2px); }

        .gavel-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0) rotate(-45deg); font-size: 10rem; opacity: 0; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100; pointer-events: none; }
        .gavel-active { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; filter: drop-shadow(0 0 30px var(--accent-cyan));}
        
        .shake { animation: shakeEffect 0.2s; }
        @keyframes shakeEffect { 0% { transform: translate(2px, 1px); } 20% { transform: translate(-1px, -2px); } 40% { transform: translate(-3px, 0px); } 100% { transform: translate(0px, 0px); } }

        .splash-footer { margin-top: 60px; font-size: 0.9rem; color: var(--text-muted); letter-spacing: 1px; opacity: 0.7; text-align: center; }

        .typewriter-cursor { border-right: 4px solid var(--accent-cyan); padding-right: 5px; animation: blink 0.8s step-end infinite; }
        @keyframes blink { from, to { border-color: transparent; } 50% { border-color: var(--accent-cyan); } }

        .fade-in-element { opacity: 0; transform: translateY(15px); transition: opacity 1s ease, transform 1s ease; pointer-events: none; }
        .fade-in-element.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .page-fade-in { animation: fadeInPage 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes fadeInPage { 0% { opacity: 0; filter: blur(15px); transform: scale(1.02); } 100% { opacity: 1; filter: blur(0); transform: scale(1); } }
        
        .page-fade-out { animation: fadeOutPage 0.5s ease-out forwards !important; }
        @keyframes fadeOutPage { 0% { opacity: 1; filter: blur(0); } 100% { opacity: 0; filter: blur(10px); } }
        
        .splash-auto-fade { animation: fadeInPage 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards, splashDarken 0.5s 3.5s forwards; }
        @keyframes splashDarken { to { opacity: 0; filter: blur(10px); } }
    </style>
</head>
<body id="mainBody" class="splash-body splash-auto-fade">

    <div class="bg-icon-container">
        <img src="crow.png" alt="Peace Icon" class="glowing-crow">
    </div>

    <main class="splash-container">
        <div class="splash-content">
    <h1 class="splash-title" id="typewriterText">&#8203;</h1>
    
    <p class="splash-mission fade-in-element">
        Advocating for strong institutions and global stability.
        <br>
        <span style="display: inline-block; margin-top: 10px; color: var(--accent-cyan); font-weight: 600;">[SDG 16]</span>
    </p>
</div>

        <div class="css-loader fade-in-element"></div>

        <div id="countdownText" class="countdown-text fade-in-element">Entering site in 4...</div>
        
        <button class="skip-btn fade-in-element" id="skipBtn">Skip Intro</button>

        <footer class="splash-footer fade-in-element">
            Usmaan Imran | Zehna Anus | Manisha Fernando | Thasreef Mohomed
        </footer>
    </main>

    <div id="gavel" class="gavel-overlay">⚖️</div>

    <script src="splash.js"></script>
</body>
</html>
